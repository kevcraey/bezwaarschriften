server:
  forward-headers-strategy: framework
  servlet:
    context-path: /
  port: 8080
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 500MB
  datasource:
    hikari:
      minimum-idle: 2
      maximum-pool-size: 15
      connection-test-query: SELECT 1
  application:
    name: bezwaarschriften
  cloud:
    config:
      import-check:
        enabled: false
  liquibase:
    change-log: classpath:/config/liquibase/master.xml
    contexts: prod
    drop-first: false
    default-schema: public
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

bezwaarschriften:
  input:
    folder: input
  ocr:
    tessdata-path: /opt/homebrew/share/tessdata

management:
  endpoint:
    health:
      show-details: when_authorized
  endpoints:
    web:
      base-path: /admin
      exposure:
        include: "*"

logging:
  level:
    ROOT: WARN
    be:
      vlaanderen:
        omgeving: INFO
  file:
    path: /var/log/${spring.application.name}

---
spring:
  config:
    activate:
      on-profile: dev
    import: "classpath:application-dev.yml"
---
spring:
  config:
    activate:
      on-profile: build
    import: "classpath:application-build.yml"
