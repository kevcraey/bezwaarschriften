spring:
  liquibase:
    change-log: classpath:/config/liquibase/master.xml
    contexts: test
    drop-first: false
    default-schema: public
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

bezwaarschriften:
  input:
    folder: input
  ocr:
    tessdata-path: /opt/homebrew/share/tessdata
  testdata:
    pad: testdata
  scheduling:
    enabled: false

management:
  endpoint:
    health:
      show-details: when_authorized
  endpoints:
    web:
      base-path: /admin
      exposure:
        include: "*"

cumuli:
  security:
    enable:
      mock: true
    users:
      - username: bezwaarschriftenSpringBootAdmin
        password: "{noop}bezwaarschriftenSpringBootAdmin"
        roles:
          - BezwaarschriftenSpringBootAdmin
      - username: gebruiker
        password: "{noop}gebruiker"
        roles:
          - BezwaarschriftenGebruiker

eureka:
  client:
    enabled: false
